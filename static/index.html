<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniAgent 聊天</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f4f6f8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #1a1a2e;
    color: #fff;
    padding: 16px 24px;
    font-size: 18px;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 14px;
    line-height: 1.6;
    word-break: break-word;
  }
  .message.user {
    align-self: flex-end;
    background: #1677ff;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .message.ai {
    align-self: flex-start;
    background: #fff;
    color: #1f1f1f;
    border: 1px solid #e8e8e8;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .reasoning-box {
    background: #f6f8fa;
    border: 1px dashed #d0d7de;
    border-radius: 8px;
    margin-bottom: 0;
    overflow: hidden;
  }
  .reasoning-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
    background: #eef1f5;
  }
  .reasoning-header:hover { background: #e4e9ef; }
  .reasoning-header span { font-size: 13px; color: #57606a; font-weight: 500; }
  .reasoning-header .arrow {
    transition: transform 0.2s ease;
    font-size: 12px;
    color: #57606a;
  }
  .reasoning-box.collapsed .arrow { transform: rotate(-90deg); }
  .reasoning-content {
    padding: 10px 12px;
    font-size: 13px;
    color: #57606a;
    white-space: pre-wrap;
    line-height: 1.5;
    transition: max-height 0.2s ease, padding 0.2s ease;
  }
  .reasoning-box.collapsed .reasoning-content {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
    overflow: hidden;
  }
  .answer-content {
    white-space: pre-wrap;
  }
  .input-area {
    background: #fff;
    border-top: 1px solid #e8e8e8;
    padding: 12px 24px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    border: 1px solid #d9d9d9;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 15px;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.4;
  }
  .input-area textarea:focus { border-color: #1677ff; }
  .send-btn {
    background: #1677ff;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .send-btn:hover { opacity: 0.9; }
  .send-btn:disabled { background: #bfbfbf; cursor: not-allowed; }
  .loading { color: #8c8c8c; font-size: 13px; margin-top: 4px; }
</style>
</head>
<body>
<div class="header">MiniAgent 聊天</div>
<div class="chat-container" id="chat"></div>
<div class="input-area">
  <textarea id="msgInput" rows="1" placeholder="输入消息，按 Enter 发送，Shift+Enter 换行..."></textarea>
  <button class="send-btn" id="sendBtn">发送</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');

  function appendUser(text) {
    const div = document.createElement('div');
    div.className = 'message user';
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function appendAI() {
    const div = document.createElement('div');
    div.className = 'message ai';

    const reasoningBox = document.createElement('div');
    reasoningBox.className = 'reasoning-box collapsed';
    reasoningBox.style.display = 'none';

    const header = document.createElement('div');
    header.className = 'reasoning-header';
    header.innerHTML = '<span>🧠 思考过程</span><span class="arrow">▼</span>';
    header.onclick = () => reasoningBox.classList.toggle('collapsed');

    const reasoningContent = document.createElement('div');
    reasoningContent.className = 'reasoning-content';

    reasoningBox.appendChild(header);
    reasoningBox.appendChild(reasoningContent);

    const answerContent = document.createElement('div');
    answerContent.className = 'answer-content';

    div.appendChild(reasoningBox);
    div.appendChild(answerContent);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return { reasoningBox, reasoningContent, answerContent };
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.rows = 1;
    appendUser(text);
    sendBtn.disabled = true;

    const { reasoningBox, reasoningContent, answerContent } = appendAI();
    let hasReasoning = false;

    const evtSource = new EventSource('/chat?q=' + encodeURIComponent(text));
    evtSource.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'reasoning') {
        if (!hasReasoning) {
          hasReasoning = true;
          reasoningBox.style.display = 'block';
          reasoningBox.classList.remove('collapsed');
        }
        reasoningContent.textContent += data.content;
        chat.scrollTop = chat.scrollHeight;
      } else if (data.type === 'text') {
        let txt = data.content;
        if (!answerContent.dataset.started) {
          answerContent.dataset.started = '1';
          txt = txt.replace(/^\n+/, '');
          reasoningContent.textContent = reasoningContent.textContent.trimEnd();
        }
        answerContent.textContent += txt;
        chat.scrollTop = chat.scrollHeight;
      } else if (data.type === 'end') {
        evtSource.close();
        sendBtn.disabled = false;
      }
    };
    evtSource.onerror = () => {
      evtSource.close();
      sendBtn.disabled = false;
      if (!answerContent.textContent) answerContent.textContent = '（连接中断）';
    };
  }

  sendBtn.onclick = send;
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
</script>
</body>
</html>
